name: Daily Horoscope Update

on:
  schedule:
    # Runs at 23:00 UTC every day
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions 

# NOTE: Since March 2026, the site uses a deterministic content generation
# system (content-pool.json + seeded hash in horoscope.js). Daily content is
# generated client-side, so this workflow is now OPTIONAL.
# It can still be used to update the legacy horoscope.json fallback file
# or to trigger cache invalidation on Cloudflare.

jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update horoscope date (legacy fallback)
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          
          # Update the date in the legacy horoscope.json (optional fallback)
          if [ -f data/horoscope.json ]; then
            jq --arg today "$TODAY" '.date = $today' data/horoscope.json > tmp.json && mv tmp.json data/horoscope.json
            echo "Updated legacy horoscope date to: $TODAY"
          fi
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -a -m "🤖 Auto-update: Daily Horoscope [skip ci]" || echo "No changes to commit"
          git push
